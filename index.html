<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSM Housenumber Checker</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    #map { width: 100%; height: 100%; }

    #status {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 15, 15, .75);
      color: #fff;
      padding: 5px 18px;
      border-radius: 20px;
      font: 13px/1.5 system-ui, sans-serif;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
      z-index: 10;
      white-space: nowrap;
    }
    #status.visible { opacity: 1; }

    /* Street list panel */
    #street-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      font: 13px/1.5 system-ui, sans-serif;
      max-width: 320px;
    }
    #street-panel-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(6px);
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font: inherit;
      color: #333;
      box-shadow: 0 1px 4px rgba(0,0,0,.18);
      user-select: none;
      width: 100%;
    }
    #street-panel-toggle:hover { background: rgba(255,255,255,.95); }
    #street-panel-toggle .arrow { font-size: 10px; margin-left: auto; transition: transform .2s; }
    #street-panel.open #street-panel-toggle .arrow { transform: rotate(180deg); }
    #street-panel-body {
      display: none;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(6px);
      border-radius: 6px;
      margin-top: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,.18);
      max-height: 340px;
      overflow-y: auto;
    }
    #street-panel.open #street-panel-body { display: block; }
    #street-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    #street-table thead th {
      position: sticky;
      top: 0;
      background: rgba(245,245,245,.95);
      padding: 6px 8px;
      text-align: left;
      color: #666;
      font-weight: 600;
      border-bottom: 1px solid rgba(0,0,0,.08);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    #street-table thead th:hover { color: #333; }
    #street-table thead th.sorted { color: #e63946; }
    #street-table tbody tr {
      cursor: pointer;
      border-bottom: 1px solid rgba(0,0,0,.05);
    }
    #street-table tbody tr:hover { background: rgba(230,57,70,.08); }
    #street-table tbody tr.active { background: rgba(230,57,70,.15); }
    #street-table td { padding: 5px 8px; }
    #street-table .td-num { text-align: right; color: #666; width: 44px; }
    #street-table .td-name { color: #222; }

    /* Settings panel */
    #settings-panel {
      position: absolute;
      bottom: 30px;
      left: 10px;
      z-index: 10;
      font: 13px/1.5 system-ui, sans-serif;
    }
    #settings-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(6px);
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font: inherit;
      color: #333;
      box-shadow: 0 1px 4px rgba(0,0,0,.18);
      user-select: none;
    }
    #settings-toggle:hover { background: rgba(255,255,255,.95); }
    #settings-toggle .arrow { font-size: 10px; transition: transform .2s; }
    #settings-panel.open #settings-toggle .arrow { transform: rotate(180deg); }
    #settings-body {
      display: none;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(6px);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,.18);
      min-width: 220px;
    }
    #settings-panel.open #settings-body { display: block; }
    .sp-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
    }
    .sp-row:last-child { margin-bottom: 0; }
    .sp-label { color: #444; white-space: nowrap; }
    .sp-row input[type=color] {
      width: 36px; height: 24px;
      border: 1px solid #ccc; border-radius: 4px;
      padding: 1px; cursor: pointer; background: none;
    }
    .sp-row input[type=range] {
      width: 100px; cursor: pointer; accent-color: #e63946;
    }
    .sp-val { min-width: 28px; text-align: right; color: #666; }
    .sp-sep {
      border: none; border-top: 1px solid rgba(0,0,0,.08);
      margin: 8px 0;
    }

    /* Popup styles */
    .maplibregl-popup-content {
      font: 13px/1.6 system-ui, sans-serif;
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: 0 2px 10px rgba(0,0,0,.2);
    }
    .popup-names .row { display: flex; gap: 8px; }
    .popup-names .tag {
      font-size: 11px;
      color: #888;
      min-width: 60px;
      flex-shrink: 0;
    }
    .popup-addr b { font-size: 15px; }
    .popup-addr span { color: #666; font-size: 12px; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="status">Loading…</div>

  <div id="street-panel">
    <button id="street-panel-toggle">
      <span id="street-panel-title">Streets</span>
      <span class="arrow">▼</span>
    </button>
    <div id="street-panel-body">
      <table id="street-table">
        <thead>
          <tr>
            <th data-col="length" title="Total length (km)">km</th>
            <th data-col="count"  title="Number of buildings">#</th>
            <th data-col="name">Name</th>
          </tr>
        </thead>
        <tbody id="street-tbody"></tbody>
      </table>
    </div>
  </div>

  <div id="settings-panel">
    <div id="settings-body">
      <div class="sp-row">
        <span class="sp-label">Street color</span>
        <input type="color" id="sp-street-color">
      </div>
      <div class="sp-row">
        <span class="sp-label">Street width</span>
        <input type="range" id="sp-street-width" min="0.5" max="8" step="0.5">
        <span class="sp-val" id="sp-street-width-val"></span>
      </div>
      <hr class="sp-sep">
      <div class="sp-row">
        <span class="sp-label">Dot color</span>
        <input type="color" id="sp-dot-color">
      </div>
      <div class="sp-row">
        <span class="sp-label">Dot size</span>
        <input type="range" id="sp-dot-radius" min="2" max="16" step="1">
        <span class="sp-val" id="sp-dot-radius-val"></span>
      </div>
    </div>
    <button id="settings-toggle">
      <span>Style settings</span><span class="arrow">▲</span>
    </button>
  </div>

  <script src="settings.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
  <script>
    // ── Map ───────────────────────────────────────────────────────────────────
    // ── URL params: ?lat=&lng=&z= ─────────────────────────────────────────────
    (function applyURLParams() {
      const p = new URLSearchParams(location.search);
      const lat = parseFloat(p.get('lat'));
      const lng = parseFloat(p.get('lng'));
      const z   = parseFloat(p.get('z'));
      if (!isNaN(lat) && !isNaN(lng)) SETTINGS.mapCenter = [lng, lat];
      if (!isNaN(z))                  SETTINGS.mapZoom   = z;
    })();

    const map = new maplibregl.Map({
      container: 'map',
      style:     'https://tiles.openfreemap.org/styles/liberty',
      center:    SETTINGS.mapCenter,
      zoom:      SETTINGS.mapZoom,
    });
    map.addControl(new maplibregl.NavigationControl(), 'top-right');

    // ── State ─────────────────────────────────────────────────────────────────
    let streetsGeoJSON    = emptyFC();
    let addressesByStreet = {};      // street name → GeoJSON Feature[]
    let selectedStreetName = null;
    let activePopup        = null;
    let fetchTimer         = null;

    function emptyFC() { return { type: 'FeatureCollection', features: [] }; }

    // ── Status bar ────────────────────────────────────────────────────────────
    const statusEl = document.getElementById('status');
    function showStatus(msg) { statusEl.textContent = msg; statusEl.classList.add('visible'); }
    function hideStatus()    { statusEl.classList.remove('visible'); }

    // ── Overpass fetch ────────────────────────────────────────────────────────
    async function fetchOSMData() {
      const b    = map.getBounds();
      const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;
      const query = [
        '[out:json][timeout:25];',
        '(',
        `  way[highway][name](${bbox});`,
        `  node["addr:housenumber"](${bbox});`,
        `  way["addr:housenumber"](${bbox});`,
        ');',
        'out body geom;',
      ].join('\n');

      showStatus('Loading…');
      try {
        const res  = await fetch(SETTINGS.overpassEndpoint, {
          method:  'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body:    'data=' + encodeURIComponent(query),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        processData(data);
        hideStatus();
      } catch (err) {
        console.error('Overpass error:', err);
        showStatus('Failed to load OSM data — see console');
        setTimeout(hideStatus, 4000);
      }
    }

    // ── Parse Overpass response ───────────────────────────────────────────────
    function processData(data) {
      // Group way segments by name → MultiLineString
      const byName = new Map(); // name → { names:{}, segments:[[coord,…],…] }
      addressesByStreet = {};

      for (const el of data.elements) {
        // ── Street ways — accumulate segments per name
        if (el.type === 'way' && el.tags?.highway && el.tags?.name && el.geometry?.length) {
          const name = el.tags.name;
          if (!byName.has(name)) {
            const names = {};
            for (const [k, v] of Object.entries(el.tags)) {
              if (k === 'name' || k.startsWith('name:')) names[k] = v;
            }
            byName.set(name, { names, segments: [] });
          }
          byName.get(name).segments.push(el.geometry.map(n => [n.lon, n.lat]));
          continue;
        }

        // ── Address nodes / building ways
        const hn = el.tags?.['addr:housenumber'];
        if (!hn) continue;

        let coords;
        if (el.type === 'node') {
          coords = [el.lon, el.lat];
        } else if (el.type === 'way' && el.geometry?.length) {
          const lons = el.geometry.map(n => n.lon);
          const lats = el.geometry.map(n => n.lat);
          coords = [
            lons.reduce((a, b) => a + b) / lons.length,
            lats.reduce((a, b) => a + b) / lats.length,
          ];
        } else { continue; }

        const street = el.tags['addr:street'] || '';
        (addressesByStreet[street] ??= []).push({
          type:     'Feature',
          geometry: { type: 'Point', coordinates: coords },
          properties: { housenumber: hn, street },
        });
      }

      // Build merged features (MultiLineString when >1 segment)
      const streetFeatures = [];
      for (const [name, { names, segments }] of byName) {
        streetFeatures.push({
          type:     'Feature',
          geometry: segments.length === 1
            ? { type: 'LineString',      coordinates: segments[0] }
            : { type: 'MultiLineString', coordinates: segments },
          properties: { name, names: JSON.stringify(names) },
        });
      }

      streetsGeoJSON = { type: 'FeatureCollection', features: streetFeatures };
      map.getSource('streets-source')?.setData(streetsGeoJSON);

      if (selectedStreetName !== null) resetSelection();
      buildStreetList();
    }

    // ── Selection ─────────────────────────────────────────────────────────────
    function resetSelection() {
      selectedStreetName = null;
      map.setFilter('streets-layer', null);
      if (map.getLayer('addr-layer'))   map.removeLayer('addr-layer');
      if (map.getSource('addr-source')) map.removeSource('addr-source');
      activePopup?.remove();
      activePopup = null;
      document.getElementById('street-panel').style.display = '';
      buildStreetList();
    }

    function selectStreet(feature) {
      const name = feature.properties.name;
      if (selectedStreetName === name) { resetSelection(); return; }

      selectedStreetName = name;
      document.getElementById('street-panel').style.display = 'none';
      map.setFilter('streets-layer', ['==', ['get', 'name'], selectedStreetName]);

      // Popup at midpoint of first segment
      const geom = feature.geometry;
      const firstSeg = geom.type === 'MultiLineString' ? geom.coordinates[0] : geom.coordinates;
      const midCoord = firstSeg[Math.floor(firstSeg.length / 2)];
      const names    = JSON.parse(feature.properties.names || '{}');
      const rows     = Object.entries(names)
        .map(([k, v]) => `<div class="row"><span class="tag">${k}</span><span>${v}</span></div>`)
        .join('');

      activePopup?.remove();
      activePopup = new maplibregl.Popup({ closeButton: false, maxWidth: '280px', offset: 6 })
        .setLngLat(midCoord)
        .setHTML(`<div class="popup-names">${rows}</div>`)
        .addTo(map);

      // Address dots for this street
      const addrs = addressesByStreet[name] ?? [];
      if (map.getLayer('addr-layer'))   map.removeLayer('addr-layer');
      if (map.getSource('addr-source')) map.removeSource('addr-source');

      map.addSource('addr-source', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: addrs },
      });
      map.addLayer({
        id:     'addr-layer',
        type:   'circle',
        source: 'addr-source',
        paint:  {
          'circle-radius':       SETTINGS.addrDotRadius,
          'circle-color':        SETTINGS.addrDotColor,
          'circle-stroke-width': SETTINGS.addrDotStrokeWidth,
          'circle-stroke-color': SETTINGS.addrDotStrokeColor,
        },
      });

      map.on('mouseenter', 'addr-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', 'addr-layer', () => { map.getCanvas().style.cursor = ''; });
    }

    // ── Map load ──────────────────────────────────────────────────────────────
    map.on('load', () => {
      map.addSource('streets-source', { type: 'geojson', data: streetsGeoJSON });
      map.addLayer({
        id:     'streets-layer',
        type:   'line',
        source: 'streets-source',
        layout: { 'line-cap': 'round', 'line-join': 'round' },
        paint:  {
          'line-color':  SETTINGS.streetColor,
          'line-width':  SETTINGS.streetWidth,
        },
      });

      // Street cursor
      map.on('mouseenter', 'streets-layer', () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', 'streets-layer', () => { map.getCanvas().style.cursor = ''; });

      // Single click handler — dispatches by hit-test
      map.on('click', (e) => {
        // Address dot takes priority
        const addrHits = map.getLayer('addr-layer')
          ? map.queryRenderedFeatures(e.point, { layers: ['addr-layer'] })
          : [];
        if (addrHits.length) {
          const { housenumber, street } = addrHits[0].properties;
          new maplibregl.Popup({ closeButton: true, offset: 10, maxWidth: '200px' })
            .setLngLat(addrHits[0].geometry.coordinates.slice())
            .setHTML(`<div class="popup-addr"><b>${housenumber}</b>${street ? `<br><span>${street}</span>` : ''}</div>`)
            .addTo(map);
          return;
        }

        const streetHits = map.queryRenderedFeatures(e.point, { layers: ['streets-layer'] });
        if (streetHits.length) { selectStreet(streetHits[0]); return; }

        // Bare map — reset
        if (selectedStreetName !== null) resetSelection();
      });

      // Update URL + debounced data refresh on pan/zoom
      map.on('moveend', () => {
        const c = map.getCenter();
        const z = map.getZoom().toFixed(1);
        history.replaceState(null, '', `?lat=${c.lat.toFixed(5)}&lng=${c.lng.toFixed(5)}&z=${z}`);
        clearTimeout(fetchTimer);
        fetchTimer = setTimeout(fetchOSMData, 700);
      });

      fetchOSMData();

      // ── Settings panel ───────────────────────────────────────────────────
      initSettingsPanel();

      // ── Street list panel ────────────────────────────────────────────────
      initStreetPanel();
    });

    // ── Street list panel ─────────────────────────────────────────────────────
    let streetSortCol = 'name';
    let streetSortAsc = true;

    function haversineKm(a, b) {
      const R = 6371, toRad = x => x * Math.PI / 180;
      const dLat = toRad(b[1] - a[1]), dLon = toRad(b[0] - a[0]);
      const h = Math.sin(dLat/2)**2 + Math.cos(toRad(a[1])) * Math.cos(toRad(b[1])) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
    }

    function featureLengthKm(f) {
      const segs = f.geometry.type === 'MultiLineString' ? f.geometry.coordinates : [f.geometry.coordinates];
      return segs.reduce((sum, seg) => {
        for (let i = 1; i < seg.length; i++) sum += haversineKm(seg[i-1], seg[i]);
        return sum;
      }, 0);
    }

    function buildStreetList() {
      const rows = streetsGeoJSON.features.map(f => ({
        feature: f,
        name:    f.properties.name,
        length:  featureLengthKm(f),
        count:   (addressesByStreet[f.properties.name] ?? []).length,
      }));

      rows.sort((a, b) => {
        const av = a[streetSortCol], bv = b[streetSortCol];
        const cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
        return streetSortAsc ? cmp : -cmp;
      });

      const tbody = document.getElementById('street-tbody');
      tbody.innerHTML = '';
      for (const r of rows) {
        const tr = document.createElement('tr');
        if (r.name === selectedStreetName) tr.classList.add('active');
        tr.innerHTML = `<td class="td-num">${r.length.toFixed(2)}</td>
                        <td class="td-num">${r.count}</td>
                        <td class="td-name">${r.name}</td>`;
        tr.addEventListener('click', () => selectStreet(r.feature));
        tbody.appendChild(tr);
      }

      document.getElementById('street-panel-title').textContent =
        `Streets (${rows.length})`;

      // Update sort indicators
      document.querySelectorAll('#street-table thead th').forEach(th => {
        th.classList.toggle('sorted', th.dataset.col === streetSortCol);
        th.textContent = th.dataset.col === 'length' ? 'km' : th.dataset.col === 'count' ? '#' : 'Name';
        if (th.dataset.col === streetSortCol) th.textContent += streetSortAsc ? ' ▲' : ' ▼';
      });
    }

    function initStreetPanel() {
      const panel = document.getElementById('street-panel');
      panel.classList.add('open');
      document.getElementById('street-panel-toggle').addEventListener('click', () => {
        panel.classList.toggle('open');
      });

      document.querySelectorAll('#street-table thead th').forEach(th => {
        th.addEventListener('click', () => {
          if (streetSortCol === th.dataset.col) streetSortAsc = !streetSortAsc;
          else { streetSortCol = th.dataset.col; streetSortAsc = th.dataset.col === 'name'; }
          buildStreetList();
        });
      });
    }

    function initSettingsPanel() {
      const panel = document.getElementById('settings-panel');
      document.getElementById('settings-toggle').addEventListener('click', () => {
        panel.classList.toggle('open');
      });

      // Helper: bind a color input
      function bindColor(id, getProp, layerId) {
        const el = document.getElementById(id);
        el.value = SETTINGS[getProp];
        el.addEventListener('input', () => {
          SETTINGS[getProp] = el.value;
          if (map.getLayer(layerId)) map.setPaintProperty(layerId, ...colorProp(layerId, el.value));
        });
      }

      function colorProp(layerId, val) {
        return layerId === 'streets-layer' ? ['line-color', val] : ['circle-color', val];
      }

      // Helper: bind a range input
      function bindRange(id, valId, getProp, layerId, mapProp, fmt) {
        const el  = document.getElementById(id);
        const lbl = document.getElementById(valId);
        el.value  = SETTINGS[getProp];
        lbl.textContent = fmt(SETTINGS[getProp]);
        el.addEventListener('input', () => {
          const v = parseFloat(el.value);
          SETTINGS[getProp] = v;
          lbl.textContent = fmt(v);
          if (map.getLayer(layerId)) map.setPaintProperty(layerId, mapProp, v);
        });
      }

      bindColor('sp-street-color', 'streetColor', 'streets-layer');
      bindRange('sp-street-width', 'sp-street-width-val', 'streetWidth', 'streets-layer', 'line-width', v => v);
      bindColor('sp-dot-color',    'addrDotColor', 'addr-layer');
      bindRange('sp-dot-radius',   'sp-dot-radius-val', 'addrDotRadius', 'addr-layer', 'circle-radius', v => v);
    }
  </script>
</body>
</html>
